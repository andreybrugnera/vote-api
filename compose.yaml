services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=vote-db'
      - 'POSTGRES_PASSWORD=${DB_PASSWD}'
      - 'POSTGRES_USER=${DB_USER}'
    ports:
      - '5432:5432'
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${DB_USER} -d vote-db' ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8080:8080'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/vote-db'
      - 'DB_USER=${DB_USER}'
      - 'DB_PASSWD=${DB_PASSWD}'
